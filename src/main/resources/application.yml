spring:
  application:
    name: api
  main:
    web-application-type: servlet

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_NAME}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE}
      max-request-size: ${MAX_REQUEST_SIZE}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health  # health만 공개
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized  # 인증된 경우만 상세 정보
  health:
    defaults:
      enabled: true
server:
  port: ${SERVER_PORT}

jwt:
  issuer: ${JWT_ISSUER}
  secret_key: ${JWT_SECRET_KEY}

security:
  auth:
    header: X-Solutio-Auth
  group-account:
    link: ${GROUP_ACCOUNT_LINK}
    number: ${GROUP_ACCOUNT_NUMBER}
    fee: ${GROUP_ACCOUNT_FEE}

